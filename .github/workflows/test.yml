name: Lightweight Dockerized CI/CD Pipeline

on: [push]

jobs:
  ci-cd-container-pipeline:
    runs-on: ubuntu-latest
    steps:
      # CI
      - name: Fetch Code from Repository
        uses: actions/checkout@v4

      - name: Setup Node Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install and Run Native Tests
        run: |
          npm install
          npm test

      # CONTAINER VALIDATION (CI)
      - name: Compile and Build Docker Container Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-light-engine:latest .

      - name: Verify Container Safety and Execution
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/ci-light-engine:latest npm test

      # CD
      - name: Authenticate with Enterprise Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Push Container Live to Production Registry
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-light-engine:latest
